<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uhren-Meister Zertifikat-Edition</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --bg: #f0f4f8;
            --text: #2d3436;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 600px;
            width: 95%;
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: 20px;
        }

        /* Analoge Uhr */
        #clock-container {
            position: relative;
            width: 220px;
            height: 220px;
            border: 8px solid #333;
            border-radius: 50%;
            margin: 15px auto;
            background: white;
            display: block;
        }

        .dot {
            position: absolute;
            width: 12px; height: 12px;
            background: #333; border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hand {
            position: absolute; bottom: 50%; left: 50%;
            transform-origin: bottom; border-radius: 5px;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hour-hand { width: 6px; height: 55px; background: #333; z-index: 3; }
        .min-hand { width: 4px; height: 85px; background: var(--primary); z-index: 2; }

        .number {
            position: absolute; font-weight: bold; font-size: 1.1rem;
        }

        /* Digital Uhr */
        #digital-display {
            font-size: 2.5rem;
            font-family: 'Courier New', monospace;
            background: #333;
            color: #0f0;
            padding: 10px 20px;
            border-radius: 15px;
            margin: 10px auto;
            display: inline-block;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        /* UI */
        .options {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; margin-top: 15px;
        }

        button {
            padding: 15px 10px; font-size: 1rem;
            border: none; border-radius: 15px;
            cursor: pointer; background: var(--secondary);
            color: white; font-weight: bold;
            box-shadow: 0 4px 0 #3dbbb3;
        }

        button:active { transform: translateY(3px); box-shadow: none; }

        progress { width: 100%; height: 20px; accent-color: var(--secondary); }

        .feedback { height: 40px; margin-top: 10px; font-weight: bold; font-size: 1.3rem; }

        /* Zertifikat Style */
        #certificate {
            display: none;
            background: #fff;
            border: 10px double #d4af37;
            padding: 40px;
            border-radius: 0;
            position: relative;
            background-image: radial-gradient(circle, #fff9e6 10%, transparent 11%);
            background-size: 20px 20px;
        }

        .cert-title { color: #d4af37; font-size: 2.5rem; margin-bottom: 20px; }
        .medal { font-size: 5rem; margin: 20px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container" id="main-game">
        <h1 style="color:var(--primary); margin:0;">🕒 Uhren-Meister</h1>
        <p id="level-title" style="font-weight:bold; color:var(--secondary);">Level 1</p>
        <progress id="progress" value="0" max="12"></progress>

        <div id="clock-container">
            <div class="dot"></div>
            <div id="hour-hand" class="hand hour-hand"></div>
            <div id="min-hand" class="hand min-hand"></div>
        </div>

        <div id="digital-display">00:00</div>

        <p id="question-text" style="font-size: 1.2rem;">Wie spät ist es?</p>

        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
    </div>

    <!-- Zertifikat -->
    <div class="container" id="certificate">
        <div class="cert-title">URKUNDE</div>
        <p>Herzlichen Glückwunsch!</p>
        <div class="medal">🏆</div>
        <h2>Du bist ein Uhren-Meister!</h2>
        <p>Du hast alle 7 Level bestanden und kannst jetzt perfekt die Uhr lesen.</p>
        <p style="margin-top:40px; border-top: 2px solid #333; display:inline-block; padding-top:5px;">Unterschrift der Zeit-Fee</p>
    </div>

    <script>
        let currentLevel = 1;
        let currentExercise = 0;
        const totalExercisesPerLevel = 12;
        let currentCorrectTime = "";
        let currentH = 0;
        let currentM = 0;

        const levels = [
            { id: 1, title: "Level 1: Ganze Stunden", modes: [0] },
            { id: 2, title: "Level 2: Halbe Stunden", modes: [30] },
            { id: 3, title: "Level 3: Viertel vor & nach", modes: [15, 45] },
            { id: 4, title: "Level 4: Zehn vor & nach", modes: [10, 50] },
            { id: 5, title: "Level 5: Fünf vor & nach", modes: [5, 55] },
            { id: 6, title: "Level 6: Digital-Profi (Text wählen)", modes: [0, 15, 30, 45], type: 'digiToText' },
            { id: 7, title: "Level 7: Der Abschluss-Check (Zahlen wählen)", modes: [0, 5, 10, 15, 30, 45, 50, 55], type: 'anaToDigi' }
        ];

        // Uhr initialisieren
        const clockContainer = document.getElementById('clock-container');
        for(let i = 1; i <= 12; i++) {
            const num = document.createElement('div');
            num.className = 'number';
            num.innerText = i;
            const angle = (i * 30) * (Math.PI / 180);
            const x = 110 + 85 * Math.sin(angle) - 8;
            const y = 110 - 85 * Math.cos(angle) - 10;
            num.style.left = x + 'px'; num.style.top = y + 'px';
            clockContainer.appendChild(num);
        }

        function getTimeText(h, m) {
            if (m === 0) return h + " Uhr";
            let nextH = h === 12 ? 1 : h + 1;
            if (m === 30) return "Halb " + nextH;
            if (m === 15) return "Viertel nach " + h;
            if (m === 45) return "Viertel vor " + nextH;
            if (m === 10) return "Zehn nach " + h;
            if (m === 50) return "Zehn vor " + nextH;
            if (m === 5) return "Fünf nach " + h;
            if (m === 55) return "Fünf vor " + nextH;
            return h + ":" + m;
        }

        function getDigitalString(h, m) {
            return h.toString().padStart(2, '0') + ":" + m.toString().padStart(2, '0');
        }

        function generateExercise() {
            const config = levels[currentLevel-1];
            document.getElementById('level-title').innerText = config.title;
            
            currentH = Math.floor(Math.random() * 12) + 1;
            currentM = config.modes[Math.floor(Math.random() * config.modes.length)];

            updateClockUI(currentH, currentM);

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            let correct;
            if(config.type === 'digiToText') {
                correct = getTimeText(currentH, currentM);
                document.getElementById('clock-container').style.display = 'none';
            } else if (config.type === 'anaToDigi') {
                correct = getDigitalString(currentH, currentM);
                document.getElementById('clock-container').style.display = 'block';
                document.getElementById('digital-display').style.visibility = 'hidden';
            } else {
                correct = getTimeText(currentH, currentM);
                document.getElementById('clock-container').style.display = 'block';
                document.getElementById('digital-display').style.visibility = 'visible';
            }

            currentCorrectTime = correct;
            let choices = [correct];

            while(choices.length < 4) {
                let h = Math.floor(Math.random() * 12) + 1;
                let m = config.modes[Math.floor(Math.random() * config.modes.length)];
                let c = (config.type === 'anaToDigi') ? getDigitalString(h, m) : getTimeText(h, m);
                if(!choices.includes(c)) choices.push(c);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(text => {
                const btn = document.createElement('button');
                btn.innerText = text;
                btn.onclick = () => checkAnswer(text);
                optionsDiv.appendChild(btn);
            });
        }

        function updateClockUI(h, m) {
            const hDeg = (h * 30) + (m * 0.5);
            const mDeg = m * 6;
            document.getElementById('hour-hand').style.transform = `translateX(-50%) rotate(${hDeg}deg)`;
            document.getElementById('min-hand').style.transform = `translateX(-50%) rotate(${mDeg}deg)`;
            document.getElementById('digital-display').innerText = getDigitalString(h, m);
        }

        function checkAnswer(answer) {
            const feedback = document.getElementById('feedback');
            if(answer === currentCorrectTime) {
                feedback.innerHTML = "🌟 Super! Richtig!";
                feedback.style.color = "#2ecc71";
                celebrate();
                currentExercise++;
                document.getElementById('progress').value = currentExercise;
                
                if(currentExercise >= totalExercisesPerLevel) {
                    if(currentLevel < levels.length) {
                        setTimeout(() => {
                            currentLevel++;
                            currentExercise = 0;
                            document.getElementById('progress').value = 0;
                            feedback.innerHTML = "Nächstes Level! 🚀";
                            generateExercise();
                        }, 1500);
                    } else {
                        showCertificate();
                    }
                } else {
                    setTimeout(generateExercise, 1200);
                }
            } else {
                feedback.innerHTML = `❌ Oje! Das ist: ${currentCorrectTime}`;
                feedback.style.color = "#e74c3c";
                setTimeout(() => {
                    feedback.innerHTML = "";
                    generateExercise();
                }, 2000);
            }
        }

        function showCertificate() {
            document.getElementById('main-game').style.display = 'none';
            document.getElementById('certificate').style.display = 'block';
            celebrate(); celebrate();
        }

        function celebrate() {
            for(let i=0; i<20; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'fixed';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '100vh';
                conf.innerText = ['⭐','✨','🎈','🎊'][Math.floor(Math.random()*4)];
                conf.style.fontSize = '2rem';
                conf.style.zIndex = '100';
                document.body.appendChild(conf);
                conf.animate([
                    { transform: 'translateY(0) rotate(0)', opacity: 1 },
                    { transform: `translateY(-110vh) rotate(${Math.random()*360}deg)`, opacity: 0 }
                ], { duration: 2000, easing: 'ease-out' }).onfinish = () => conf.remove();
            }
        }

        generateExercise();
    </script>
</body>
</html>
